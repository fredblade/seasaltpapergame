<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Salt &amp; Paper — Card Reference</title>
  <meta name="description" content="Browse every card in the Sea Salt &amp; Paper deck, displayed exactly as they appear in-game.">
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Shared game styles (card-item, colors, etc.) -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page-level layout overrides for the reference page */
    body {
      overflow-x: hidden;
    }

    .ref-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    /* Hero Header */
    .ref-hero {
      margin-bottom: 32px;
      text-align: center;
    }

    .ref-hero h1 {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .ref-hero p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      background: rgba(0, 210, 252, 0.1);
      border: 1px solid rgba(0, 210, 252, 0.3);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--font-logo);
    }

    /* Section panels */
    .ref-section {
      margin-bottom: 40px;
    }

    .ref-section-title {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    /* Cards grid — uses the same .card-item component as the game */
    .cards-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Slightly larger cards for the reference page so they're easy to read */
    .cards-gallery .card-item {
      width: 105px;
      height: 152px;
      cursor: default;
      flex-shrink: 0;
    }

    .cards-gallery .card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
    }

    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-top: 40px;
      font-size: 1rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-family: var(--font-logo);
      margin-bottom: 24px;
      font-size: 0.92rem;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="ref-wrap">
    <a class="back-link" href="/">← Back to Game</a>

    <div class="ref-hero">
      <h1>🌊 Card Reference</h1>
      <p>Every card in the Sea Salt &amp; Paper deck, exactly as shown in-game.</p>
      <div class="badge-row" id="badge-row"></div>
    </div>

    <p class="error-msg" id="error-msg" hidden></p>

    <!-- Main game cards (Duos, Collectors, Specials) -->
    <div class="ref-section" id="section-main">
      <h2 class="ref-section-title">Main Cards</h2>
      <div class="cards-gallery" id="gallery-main"></div>
    </div>

    <!-- Color bonus cards -->
    <div class="ref-section" id="section-color">
      <h2 class="ref-section-title">Color Cards</h2>
      <div class="cards-gallery" id="gallery-color"></div>
    </div>
  </div>

  <!-- Shared card render helpers (renderCardInnerMarkup etc.) -->
  <script src="js/cards-shared.js"></script>
  <script>
    async function loadCards() {
      const errorEl = document.getElementById('error-msg');
      const badgeRow = document.getElementById('badge-row');
      const galleryMain = document.getElementById('gallery-main');
      const galleryColor = document.getElementById('gallery-color');

      try {
        // Fetch all 58 real deck cards (with proper CSS colors)
        const deckRes = await fetch('/api/deck');
        if (!deckRes.ok) throw new Error('Could not load deck data.');
        const deck = await deckRes.json();

        // Fetch color cards from the cards API
        const cardsRes = await fetch('/api/cards');
        if (!cardsRes.ok) throw new Error('Could not load cards data.');
        const cardsData = await cardsRes.json();
        const colorCards = Array.isArray(cardsData.colorCards) ? cardsData.colorCards : [];

        // Summary badges
        const colorCardTotal = colorCards.reduce((sum, c) => sum + (c.quantity || 0), 0);
        [
          `${deck.length} Main Cards`,
          `${colorCardTotal} Color Cards`,
          `${deck.length + colorCardTotal} Total`
        ].forEach(label => {
          const b = document.createElement('span');
          b.className = 'badge';
          b.textContent = label;
          badgeRow.appendChild(b);
        });

        // Render every individual main deck card as a .card-item
        deck.forEach(card => {
          const el = document.createElement('div');
          el.className = 'card-item';
          el.dataset.color = card.color;
          el.innerHTML = renderCardInnerMarkup(card);
          galleryMain.appendChild(el);
        });

        // Render color cards (one card-item per copy, or one per color type)
        // Show one representative tile per color with quantity badge
        colorCards.forEach(card => {
          // Build a card-like object compatible with renderCardInnerMarkup
          const cardObj = {
            name: card.color,
            type: 'color',
            color: card.color,
            emoji: card.emoji,
            quantity: card.quantity,
            points: card.points
          };

          // We show each color once with a small quantity label
          const wrapper = document.createElement('div');
          wrapper.style.position = 'relative';
          wrapper.style.display = 'inline-block';

          const el = document.createElement('div');
          el.className = 'card-item';
          el.dataset.color = card.color;
          el.innerHTML = `
            <div class="card-top-row">
              <div class="card-icon-box">${card.emoji}</div>
              <div class="card-score-ladder small"><span>1</span></div>
            </div>
            <div class="card-main">
              <div class="card-emoji">${card.emoji}</div>
            </div>
            <div class="card-name-strip">${card.color}</div>
            <div class="card-footer-info">
              <span class="card-effect-badge">×${card.quantity} &nbsp; Color Bonus</span>
            </div>
          `;

          wrapper.appendChild(el);
          galleryColor.appendChild(wrapper);
        });

      } catch (err) {
        errorEl.hidden = false;
        errorEl.textContent = err.message || 'Failed to load cards.';
      }
    }

    loadCards();
  </script>
</body>
</html>
